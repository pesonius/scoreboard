<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Scoreboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="scoreboard-page" tabindex="0">

  <!-- Court grid -->
  <div class="court">

    <!-- Left history strip -->
    <div class="side-strip" id="side-strip-0"></div>

    <!-- Left player panel (tap to score P1) -->
    <div class="player-panel" id="player-panel-0" onclick="handlePoint(0)">
      <div class="name-bar">
        <span class="player-name" id="player-name-0">Player 1</span>
      </div>
      <div class="score-zone">
        <div class="serve-icon" id="server-dot-0">
          <!-- shuttlecock SVG -->
          <svg viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
            <path d="M12 2C9.8 2 8 3.8 8 6s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm6 4l-1.4 1.4-2.1-2.1c-.5.3-1 .5-1.5.6V22h-2v-10.1c-.5-.1-1-.3-1.5-.6L7.4 13.4 6 12l6-6 6 6z"/>
          </svg>
        </div>
        <div class="score" id="score-0">0</div>
        <div class="tennis-sub hidden" id="tennis-games-p0"></div>
      </div>
    </div>

    <!-- Center column -->
    <div class="center-col">
      <div class="center-sport" id="sport-label">🏸</div>

      <div class="center-game-info" id="game-info">Game 1</div>

      <div class="sets-display">
        <span class="set-num" id="sets-won-0">0</span>
        <span class="sets-sep">:</span>
        <span class="set-num" id="sets-won-1">0</span>
      </div>

      <div class="score-extra" id="score-extra"></div>

      <div class="timer-block">
        <div class="timer-row">
          <span class="t-val" id="timer-session">0:00</span>
          <span class="t-lbl">session</span>
        </div>
        <div class="timer-row">
          <span class="t-val" id="timer-game">0:00</span>
          <span class="t-lbl">game</span>
        </div>
        <div class="timer-row">
          <span class="t-val" id="timer-rally">0:00</span>
          <span class="t-lbl">rally</span>
        </div>
      </div>

      <div class="center-btns">
        <button class="court-btn" onclick="handleUndo()" title="Undo">
          <svg viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
            <path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/>
          </svg>
          Undo
        </button>
        <a href="index.html" class="court-btn court-btn-dim">Setup</a>
        <button id="end-session-btn" class="court-btn court-btn-danger hidden" onclick="endSession()">End</button>
      </div>
    </div>

    <!-- Right player panel (tap to score P2) -->
    <div class="player-panel" id="player-panel-1" onclick="handlePoint(1)">
      <div class="name-bar">
        <span class="player-name" id="player-name-1">Player 2</span>
      </div>
      <div class="score-zone">
        <div class="serve-icon serve-icon-right" id="server-dot-1">
          <svg viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
            <path d="M12 2C9.8 2 8 3.8 8 6s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm6 4l-1.4 1.4-2.1-2.1c-.5.3-1 .5-1.5.6V22h-2v-10.1c-.5-.1-1-.3-1.5-.6L7.4 13.4 6 12l6-6 6 6z"/>
          </svg>
        </div>
        <div class="score" id="score-1">0</div>
        <div class="tennis-sub hidden" id="tennis-games-p1"></div>
      </div>
    </div>

    <!-- Right history strip -->
    <div class="side-strip side-strip-right" id="side-strip-1"></div>

  </div><!-- .court -->

  <!-- Key hint strip (fades after first point) -->
  <div class="sb-hint" id="sb-hint">
    <div class="hint-item">
      <span class="guide-key" id="hint-key1">←</span>
      <span class="hint-action" id="hint-p1">P1</span>
    </div>
    <div class="hint-item" style="color:#333">│</div>
    <div class="hint-item">
      <span class="hint-action" id="hint-p2">P2</span>
      <span class="guide-key" id="hint-key2">→</span>
    </div>
    <div class="hint-item" style="color:#333">│</div>
    <div class="hint-item">
      <span>Hold ≥ 0.8 s</span>
      <span class="hint-action">Undo</span>
    </div>
  </div>

  <!-- Game-over overlay (session mode) -->
  <div id="game-over-overlay" class="court-overlay hidden">
    <div class="overlay-label">Game <span id="game-over-num"></span></div>
    <div id="game-over-winner" class="overlay-winner"></div>
    <div id="game-over-score" class="overlay-score"></div>
    <div class="overlay-tally">
      Games: <span id="game-over-tally"></span>
    </div>
    <div class="overlay-prompt">Press any button to continue</div>
  </div>

  <!-- Winner overlay (best-of mode) -->
  <div id="winner-overlay" class="court-overlay hidden">
    <div class="overlay-label">Winner</div>
    <div id="winner-name" class="overlay-winner"></div>
    <div class="overlay-btns">
      <button class="court-btn court-btn-success" onclick="rematch()">Rematch</button>
      <button class="court-btn court-btn-dim" onclick="newMatch()">New Match</button>
    </div>
  </div>

  <script src="js/scoring.js"></script>
  <script src="js/input.js"></script>
  <script src="js/history.js"></script>
  <script>
  'use strict';

  const KEY_CONFIG = 'scoreboard.config';
  const KEY_STATE  = 'scoreboard.state';
  const KEY_UNDO   = 'scoreboard.undoStack';
  const MAX_UNDO   = 50;

  function generateId() {
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
  }

  function loadJSON(key, def) {
    try { return JSON.parse(localStorage.getItem(key) ?? 'null') ?? def; } catch { return def; }
  }

  let config = null;
  let state  = null;
  let sport  = null;
  let handler = null;

  function init() {
    config = loadJSON(KEY_CONFIG, null);
    if (!config) { window.location.href = 'index.html'; return; }

    sport = Sports[config.sport];
    if (!sport) { alert('Unknown sport: ' + config.sport); window.location.href = 'index.html'; return; }

    state = loadJSON(KEY_STATE, null);
    if (!state || state.sport !== config.sport) {
      state = sport.initState(config);
      save();
    }

    // Ensure timing fields present (graceful for states saved before timers added)
    if (!state.gameStartedAt) state.gameStartedAt = state.startedAt;
    if (!state.pointDurations) state.pointDurations = [];

    handler = new InputHandler(config.keymap, { onPoint: handlePoint, onUndo: handleUndo });
    handler.attach();

    document.body.focus();
    initHint();
    startTimers();
    if (config.sessionMode) $('end-session-btn').classList.remove('hidden');
    render(state);
    if (state.gameOver) showGameOverOverlay();
  }

  // ── Timers ────────────────────────────────────────────────────────────────
  let timerInterval = null;

  function startTimers() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(updateTimers, 1000);
    updateTimers();
  }

  function updateTimers() {
    const now = Date.now();
    $('timer-session').textContent = formatTimer(now - new Date(state.startedAt).getTime());

    // Game and rally timers freeze when a game or match is over
    if (state.gameOver || state.matchOver) return;

    const gameStart = new Date(state.gameStartedAt || state.startedAt).getTime();
    $('timer-game').textContent = formatTimer(now - gameStart);

    const rallyStart = state.lastPointAt
      ? new Date(state.lastPointAt).getTime()
      : gameStart;
    $('timer-rally').textContent = formatTimer(now - rallyStart);
  }

  function formatTimer(ms) {
    const s = Math.max(0, Math.floor(ms / 1000));
    const m = Math.floor(s / 60);
    return `${m}:${String(s % 60).padStart(2, '0')}`;
  }

  // ── Key hint ──────────────────────────────────────────────────────────────
  let hintTimer = null;

  function initHint() {
    $('hint-key1').textContent = config.keymap.button1 || '—';
    $('hint-key2').textContent = config.keymap.button2 || '—';
    $('hint-p1').textContent   = config.playerNames[0] || 'P1';
    $('hint-p2').textContent   = config.playerNames[1] || 'P2';
    hintTimer = setTimeout(fadeHint, 6000);
  }

  function fadeHint() {
    const el = $('sb-hint');
    if (el) el.classList.add('fade-out');
  }

  // ── Point & Undo ──────────────────────────────────────────────────────────
  function handlePoint(player) {
    if (state.gameOver) { continueSession(); return; }
    if (state.matchOver) return;

    // Record rally duration before scoring
    const now = Date.now();
    const gameStart = new Date(state.gameStartedAt || state.startedAt).getTime();
    const rallyStart = state.lastPointAt ? new Date(state.lastPointAt).getTime() : gameStart;
    const rallySeconds = Math.round((now - rallyStart) / 1000);

    const prevGame = state.currentGame;
    pushUndo(state);
    state = sport.applyPoint(state, player);

    // Stamp timing on new state
    state.lastPointAt = new Date(now).toISOString();
    if (!state.pointDurations) state.pointDurations = [];
    state.pointDurations.push(rallySeconds);

    // Best-of mode: reset game timer when a new game starts
    if (!state.sessionMode && state.currentGame !== prevGame && !state.matchOver) {
      state.gameStartedAt = new Date(now).toISOString();
      state.lastPointAt = null;
      state.pointDurations = [];
    }

    save();
    render(state);

    if (state.gameOver) {
      saveCurrentGameToHistory();
      showGameOverOverlay();
    } else if (state.matchOver) {
      onMatchOver();
    }

    if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
    fadeHint();
  }

  function handleUndo() {
    if (state.gameOver) return;
    const prev = popUndo();
    if (!prev) return;
    state = prev;
    // Restore timing fields if the undo snapshot lacks them
    if (!state.gameStartedAt) state.gameStartedAt = state.startedAt;
    if (!state.pointDurations) state.pointDurations = [];
    save();
    render(state, { undo: true });
    $('winner-overlay').classList.add('hidden');
  }

  // ── Session mode ──────────────────────────────────────────────────────────
  function saveCurrentGameToHistory() {
    const last = state.gamesHistory[state.gamesHistory.length - 1];
    if (!last) return;
    const gameDuration = Math.round(
      (Date.now() - new Date(state.gameStartedAt || state.startedAt).getTime()) / 1000
    );
    appendMatch({
      id: generateId(),
      date: new Date().toISOString(),
      sport: config.sport,
      sessionMode: true,
      bestOf: null,
      players: config.playerIds.map((id, i) => ({ id, name: config.playerNames[i] })),
      winner: state.lastGameWinner,
      setsWon: state.lastGameWinner === 0 ? [1, 0] : [0, 1],
      gamesHistory: [{ points: [...last.points] }],
      durationSeconds: gameDuration,
      pointDurations: [...(state.pointDurations || [])],
    });
  }

  function showGameOverOverlay() {
    const w = state.lastGameWinner;
    const last = state.gamesHistory[state.gamesHistory.length - 1];
    $('game-over-num').textContent  = state.currentGame;
    $('game-over-winner').textContent = config.playerNames[w];
    $('game-over-score').textContent  = last ? `${last.points[0]} – ${last.points[1]}` : '';
    $('game-over-tally').textContent  =
      `${config.playerNames[0]} ${state.setsWon[0]} – ${state.setsWon[1]} ${config.playerNames[1]}`;
    $('game-over-overlay').classList.remove('hidden');
  }

  function continueSession() {
    $('game-over-overlay').classList.add('hidden');
    state = sport.continueSession(state);
    // Reset game-level timing for new game
    state.gameStartedAt = new Date().toISOString();
    state.lastPointAt = null;
    state.pointDurations = [];
    save();
    localStorage.setItem(KEY_UNDO, '[]');
    render(state);
  }

  function endSession() {
    localStorage.removeItem(KEY_STATE);
    localStorage.removeItem(KEY_UNDO);
    window.location.href = 'stats.html';
  }

  // ── Match end (best-of) ───────────────────────────────────────────────────
  function onMatchOver() {
    appendMatch({
      id: generateId(),
      date: state.startedAt,
      sport: config.sport,
      bestOf: state.bestOf,
      players: config.playerIds.map((id, i) => ({ id, name: config.playerNames[i] })),
      winner: state.winner,
      setsWon: [...state.setsWon],
      gamesHistory: state.gamesHistory.map(g => ({ points: [...g.points] })),
      durationSeconds: Math.round((Date.now() - new Date(state.startedAt).getTime()) / 1000),
      pointDurations: [...(state.pointDurations || [])],
    });
    $('winner-name').textContent = config.playerNames[state.winner];
    $('winner-overlay').classList.remove('hidden');
  }

  function rematch() {
    const newServer = 1 - (config.initialServer ?? 0);
    config.initialServer = newServer;
    localStorage.setItem(KEY_CONFIG, JSON.stringify(config));
    state = sport.initState({ ...config, initialServer: newServer });
    localStorage.setItem(KEY_STATE, JSON.stringify(state));
    localStorage.setItem(KEY_UNDO, '[]');
    $('winner-overlay').classList.add('hidden');
    render(state);
  }

  function newMatch() {
    localStorage.removeItem(KEY_STATE);
    localStorage.removeItem(KEY_UNDO);
    window.location.href = 'index.html';
  }

  // ── Storage helpers ───────────────────────────────────────────────────────
  function save() { localStorage.setItem(KEY_STATE, JSON.stringify(state)); }

  function pushUndo(st) {
    const stack = loadJSON(KEY_UNDO, []);
    stack.push(JSON.parse(JSON.stringify(st)));
    if (stack.length > MAX_UNDO) stack.shift();
    localStorage.setItem(KEY_UNDO, JSON.stringify(stack));
  }

  function popUndo() {
    const stack = loadJSON(KEY_UNDO, []);
    if (!stack.length) return null;
    const prev = stack.pop();
    localStorage.setItem(KEY_UNDO, JSON.stringify(stack));
    return prev;
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function $(id) { return document.getElementById(id); }

  const SPORT_ICONS = { badminton: '🏸', tennis: '🎾', squash: '🟡', tabletennis: '🏓' };

  function render(st, opts = {}) {
    const display = sport.getDisplayScore(st);
    const isTennis = config.sport === 'tennis';

    // Sport icon + game counter
    $('sport-label').textContent = SPORT_ICONS[config.sport] || '🏅';
    $('game-info').textContent = config.sessionMode
      ? `Game ${st.currentGame}`
      : `Game ${st.currentGame} of ${st.bestOf}`;

    // Player names + serve icons
    for (let i = 0; i < 2; i++) {
      $(`player-name-${i}`).textContent = config.playerNames[i] || `P${i + 1}`;
      const icon = $(`server-dot-${i}`);
      if (icon) icon.classList.toggle('active', st.server === i);
    }

    // Main score numbers
    const s0 = $('score-0');
    const s1 = $('score-1');

    if (isTennis) {
      const isTxt = /[A-Z]/.test(display.p1);
      setScore(s0, display.p1, isTxt);
      setScore(s1, display.p2, isTxt);
      $('tennis-games-p0').textContent = st.points[0];
      $('tennis-games-p1').textContent = st.points[1];
      $('tennis-games-p0').classList.remove('hidden');
      $('tennis-games-p1').classList.remove('hidden');
    } else {
      setScore(s0, display.p1, false);
      setScore(s1, display.p2, false);
      $('tennis-games-p0').classList.add('hidden');
      $('tennis-games-p1').classList.add('hidden');
    }

    if (opts.undo) { flashUndo(s0); flashUndo(s1); }

    // Extra label (DEUCE / ADV / TIEBREAK)
    const extra = $('score-extra');
    extra.textContent = display.extra || '';
    extra.classList.toggle('visible', !!display.extra);

    // Sets / games tally in center
    $('sets-won-0').textContent = st.setsWon[0];
    $('sets-won-1').textContent = st.setsWon[1];

    // Side strips: game history
    renderSideStrips(st);
  }

  function setScore(el, text, isText) {
    el.textContent = text;
    if (isText) {
      el.style.fontSize = '9vw';
    } else if (text.length <= 1) {
      el.style.fontSize = 'min(28vw, 62vh)';
    } else {
      el.style.fontSize = 'min(19vw, 52vh)';
    }
  }

  function renderSideStrips(st) {
    for (let p = 0; p < 2; p++) {
      const strip = $(`side-strip-${p}`);
      if (!strip) continue;
      if (!st.gamesHistory.length) { strip.innerHTML = ''; continue; }
      strip.innerHTML = st.gamesHistory.map(g => {
        const myScore  = g.points[p];
        const oppScore = g.points[1 - p];
        const won = myScore > oppScore;
        return `<div class="side-score${won ? ' side-score-win' : ''}">${myScore}</div>`;
      }).join('');
    }
  }

  function flashUndo(el) {
    el.classList.remove('undo-flash');
    void el.offsetWidth;
    el.classList.add('undo-flash');
    setTimeout(() => el.classList.remove('undo-flash'), 300);
  }

  // ── Touch guards ──────────────────────────────────────────────────────────
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  // Allow button/link taps, but prevent double-tap zoom on court
  document.addEventListener('touchend', e => {
    const tag = e.target.tagName;
    if (tag === 'BUTTON' || tag === 'A') return;
    // player-panel taps handled via onclick; prevent default zoom
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('DOMContentLoaded', init);
  </script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
